  <text x="220" y="200" fill="#737680" font-family="monospace" font-size="10">11-23</text>
  <text x="300" y="200" fill="#737680" font-family="monospace" font-size="10">12-02</text>
  <text x="380" y="200" fill="#737680" font-family="monospace" font-size="10">12-11</text>
  <text x="460" y="200" fill="#737680" font-family="monospace" font-size="10">12-20</text>
