# -- Number of replicas
replicas: 1

# -- Image configuration
image:
  name: 416849462746.dkr.ecr.ap-northeast-2.amazonaws.com/prod-willog-demo-ecr
  tag: latest
  pullPolicy: Always

# -- Optional image pull secrets
imagePullSecrets: []

# -- Service port (container port and service port)
service:
  port: 8080

# -- Liveness and readiness probe settings
probes:
  path: /health
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1

# -- Node affinity: schedule pods on ARM64 nodes only
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/arch
              operator: In
              values:
                - arm64

# -- Ingress configuration (AWS ALB)
ingress:
  enabled: true
  className: alb
  host: test-demo.willog.io
  annotations:
    alb.ingress.kubernetes.io/group.name: devinternal
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/target-type: ip
