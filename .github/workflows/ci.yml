name: CI - Build & Push to ECR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      push_image:
        description: "ECR에 이미지 푸시"
        required: true
        type: boolean
        default: true
      auto_deploy:
        description: "ArgoCD 자동 배포 (latest 태그 포함, push_image 필요)"
        required: true
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npx tsc -b

  build-and-push:
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      github.event_name == 'workflow_dispatch'
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/arm64
          build-args: |
            VITE_MAPBOX_TOKEN=${{ secrets.VITE_MAPBOX_TOKEN }}
            VITE_MAPBOX_STYLE=${{ secrets.VITE_MAPBOX_STYLE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure AWS credentials (OIDC)
        if: github.event_name == 'push' || inputs.push_image == true
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push' || inputs.push_image == true
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        if: github.event_name == 'push' || inputs.push_image == true
        id: meta
        run: |
          TAG=$(echo "${{ github.sha }}" | cut -c1-7)
          REGISTRY=${{ steps.ecr-login.outputs.registry }}
          TAGS="${REGISTRY}/${ECR_REPOSITORY}:${TAG}"
          if [[ "${{ github.event_name }}" == "push" ]] || [[ "${{ inputs.auto_deploy }}" == "true" ]]; then
            TAGS="${TAGS}
          ${REGISTRY}/${ECR_REPOSITORY}:latest"
          fi
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Push to ECR
        if: github.event_name == 'push' || inputs.push_image == true
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VITE_MAPBOX_TOKEN=${{ secrets.VITE_MAPBOX_TOKEN }}
            VITE_MAPBOX_STYLE=${{ secrets.VITE_MAPBOX_STYLE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
