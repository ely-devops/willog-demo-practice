  <circle cx="620" cy="130" r="4" fill="white" stroke="#417DF7" stroke-width="2"/>

  <!-- Peak label -->
  <text x="130" y="40" fill="#17171C" font-family="sans-serif" font-size="12">195</text>

  <!-- Low label -->
  <text x="620" y="150" fill="#17171C" font-family="sans-serif" font-size="12">138</text>

  <!-- X-axis labels -->
  <text x="60" y="200" fill="#737680" font-family="monospace" font-size="10">11-05</text>
